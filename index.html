<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mixtape</title>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags/dist/jsmediatags.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#011638;
color:#eef0f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* STARS */

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:#eef0f2;
border-radius:50%;
opacity:.7;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}

/* PLAYER */

.player{
width:92%;
max-width:420px;
background:#141414;
border-radius:20px;
padding:24px;
box-shadow:0 0 40px rgba(0,0,0,.6);
position:relative;
z-index:2;
display:flex;
flex-direction:column;
gap:18px;
}

/* ARTWORK */

.art{
width:100%;
aspect-ratio:1;
background:#000;
border-radius:12px;
background-size:cover;
background-position:center;
box-shadow:0 0 25px rgba(13,33,161,.5);
}

/* SONG INFO */

.title{
font-size:18px;
font-weight:600;
}

.artist{
font-size:14px;
opacity:.7;
}

/* CONTROLS */

.controls{
display:flex;
justify-content:center;
gap:10px;
}

button{
background:#0d21a1;
border:none;
padding:10px 14px;
border-radius:10px;
color:#eef0f2;
font-size:14px;
cursor:pointer;
}

/* PLAYLIST */

.playlist{
max-height:200px;
overflow-y:auto;
border-top:1px solid rgba(255,255,255,.1);
padding-top:10px;
}

.song{
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.song:hover{
background:#0d21a1;
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="player">

<div class="art" id="artwork"></div>

<div>

<div class="title" id="title">Mixtape</div>

<div class="artist" id="artist"></div>

</div>

<div class="controls">

<button onclick="prevSong()">◀</button>

<button onclick="togglePlay()">Play / Pause</button>

<button onclick="nextSong()">▶</button>

<button onclick="shuffleSong()">Shuffle</button>

</div>

<div class="playlist" id="songlist"></div>

<audio id="audio"></audio>

</div>

<script>

/* STAR FIELD */

const starContainer=document.getElementById("stars")

for(let i=0;i<120;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"%"
star.style.top=Math.random()*100+"%"
star.style.animationDelay=Math.random()*3+"s"

starContainer.appendChild(star)

}

/* SONG LIST */

const songs = [
  {
    url: "https://raw.githubusercontent.com/jananimenon/orig_mixtape/main/songs/Chitra%20Singh%20%26%20Jagjit%20Singh%20-%20Baad%20Muddat%20Unhain%20(From%20Main%20Aur%20Meri%20Tanhai).mp3",
    title: "Baad Mudat Unhein",
    artist: "Jagjit Singh",
    artwork: "https://raw.githubusercontent.com/jananimenon/orig_mixtape/main/images/Jagjit%20Singh.jpg"
  },
  {
    url: "https://raw.githubusercontent.com/jananimenon/orig_mixtape/main/songs/Asha%20Bhosle%20%26%20Jagjit%20Singh%20-%20Jab%20Samne%20Tum%20Aa%20Jate%20Ho.mp3",
    title: "Jab Saamne Tum Aajate Ho",
    artist: "Jagjit Singh, Asha Bhonsle",
    artwork: "https://raw.githubusercontent.com/jananimenon/orig_mixtape/main/images/Jagjit%20Singh.jpg"
  },
  {
    url: "https://raw.githubusercontent.com/jananimenon/orig_mixtape/main/songs/Ek%20Pyar%20Ka%20Nagma%20Hai%20_%20Lyrical%20Video%20_%20Jagjit%20Singh%20Old%20Hindi%20song%20_%20Evergreen%20Song.mp3",
    title: "Ek Pyaar Ka Nagma Hai",
    artist: "Jagjit Singh",
    artwork: "https://raw.githubusercontent.com/jananimenon/orig_mixtape/main/images/Jagjit%20Singh.jpg"
  },
  {
    url: "https://raw.githubusercontent.com/jananimenon/orig_mixtape/main/songs/Gham%20Ka%20Khazana%20Tera%20Bhi%20Hai%20With%20Lyrical%20_%20Jagjit%20Singh%20_%20Lata%20Mangeshkar%20_%20Sentimental%20Ghazal.mp3",
    title: "Gham Ka Khazana Tera Bhi Hai",
    artist: "Jagjit Singh",
    artwork: "https://raw.githubusercontent.com/jananimenon/orig_mixtape/main/images/Jagjit%20Singh.jpg"
  }
];

let currentIndex=0

const audio=document.getElementById("audio")
const artwork=document.getElementById("artwork")
const title=document.getElementById("title")
const artist=document.getElementById("artist")
const list=document.getElementById("songlist")

/* BUILD PLAYLIST */

songs.forEach((song,i)=>{

let name=song.url
.split("/")
.pop()
.replace(".mp3","")
.replace(/%20/g," ")

let div=document.createElement("div")

div.className="song"

div.innerText=name

div.onclick=()=>playSong(i)

list.appendChild(div)

})

/* PLAY SONG */

function playSong(i) {
  currentIndex = i;
  audio.src = songs[i].url;
  audio.play();
  title.innerText = songs[i].title;
  artist.innerText = songs[i].artist;
  artwork.style.backgroundImage = `url(${songs[i].artwork})`;
}

/* PLAY PAUSE */

function togglePlay(){

if(audio.paused){
audio.play()
}else{
audio.pause()
}

}

/* NEXT */

function nextSong(){

currentIndex++

if(currentIndex>=songs.length)currentIndex=0

playSong(currentIndex)

}

/* PREVIOUS */

function prevSong(){

currentIndex--

if(currentIndex<0)currentIndex=songs.length-1

playSong(currentIndex)

}

/* SHUFFLE */

function shuffleSong(){

let rand=Math.floor(Math.random()*songs.length)

playSong(rand)

}

/* AUTOPLAY NEXT */

audio.addEventListener("ended",()=>{

nextSong()

})

/* AUTOSTART */

window.onload=()=>{

playSong(0)

}

</script>

</body>
</html>
