<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Saanj-e-Ghazal</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#011638;
  color:#eef0f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 0; /* top/bottom breathing space */
  box-sizing:border-box;
}

/* STARS BACKGROUND */
.stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:#eef0f2;
  border-radius:50%;
  opacity:.7;
  animation:twinkle 3s infinite;
}
@keyframes twinkle{
  0%{opacity:.2}
  50%{opacity:1}
  100%{opacity:.2}
}

/* PLAYER */
.player{
  width:92%;
  max-width:420px;
  height:90vh;
  background:#141414;
  border-radius:20px;
  padding:24px;
  box-shadow:0 0 40px rgba(0,0,0,.6);
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  gap:18px;
  text-align:center;
  box-sizing:border-box;
}

/* ARTWORK */
.art{
  width:100%;
  aspect-ratio:1;
  background:#000;
  border-radius:12px;
  background-size:cover;
  background-position:center;
  box-shadow:0 0 25px rgba(13,33,161,.5);
}

/* PROGRESS BAR */
.progress-container{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.2);
  border-radius:3px;
  margin-top:10px;
  cursor:pointer;
}
.progress{
  height:100%;
  background:#0f2fff;
  border-radius:3px;
  width:0%;
}

/* SONG INFO */
.title{ font-size:20px; font-weight:600; margin-top:8px; }
.artist{ font-size:16px; opacity:.7; margin-bottom:8px; }

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:15px;
}
.controls button{
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0d21a1;
  color:#eef0f2;
  border:none;
  cursor:pointer;
  transition: transform 0.2s ease, background 0.2s ease;
}
.controls button:hover{ transform:scale(1.15); background:#0f2fff; }
.controls button:active{ transform:scale(0.95); }

/* PLAYLIST */
.playlist{
  flex:1;
  overflow-y:auto;
  border-top:1px solid rgba(255,255,255,.1);
  padding:10px 0;
  margin-top:10px;
}

/* CUSTOM SCROLLBAR */
.playlist::-webkit-scrollbar{ width:8px; }
.playlist::-webkit-scrollbar-track{ background:rgba(255,255,255,0.05); border-radius:4px; margin:5px 0; }
.playlist::-webkit-scrollbar-thumb{ background:#0f2fff; border-radius:4px; transition:background 0.2s; }
.playlist::-webkit-scrollbar-thumb:hover{ background:#00f; }

.song{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  transition:background 0.2s;
}
.song:hover{ background:#0d21a1; }
.song.active{ background:#0f2fff; }
</style>
</head>

<body>
<div class="stars" id="stars"></div>

<div class="player">
  <div class="art" id="artwork"></div>

  <div class="progress-container" id="progressContainer">
    <div class="progress" id="progress"></div>
  </div>

  <div>
    <div class="title" id="title">Saanj-e-Ghazal</div>
    <div class="artist" id="artist"></div>
  </div>

  <div class="controls">
    <button id="prevBtn">
      <!-- previous SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M3.885 21.06a.76.76 0 0 1-.75-.75V3.69a.75.75 0 0 1 1.5 0v16.6a.75.75 0 0 1-.75.77m16.98-15.713v13.25a2.35 2.35 0 0 1-.32 1.13a2.2 2.2 0 0 1-1.89 1.07h-.1a2.1 2.1 0 0 1-1.11-.36l-9.13-6.12a2.25 2.25 0 0 1-.71-.76a2.3 2.3 0 0 1-.27-1a2.2 2.2 0 0 1 .2-1a2.2 2.2 0 0 1 .64-.81l9.14-7.09a2.2 2.2 0 0 1 1.13-.44a2.2 2.2 0 0 1 2.09 1.02c.204.335.318.718.33 1.11"/></svg>
    </button>

    <button id="playBtn">
      <!-- play SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M21.409 9.353a2.998 2.998 0 0 1 0 5.294L8.597 21.614C6.534 22.737 4 21.277 4 18.968V5.033c0-2.31 2.534-3.769 4.597-2.648z"/></svg>
    </button>

    <button id="nextBtn">
      <!-- next SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M20.095 21a.75.75 0 0 1-.75-.75V3.75a.75.75 0 0 1 1.5 0v16.5a.74.74 0 0 1-.75.75m-3.4-9.589a2.25 2.25 0 0 1-.85 1.82l-9.11 7.09c-.326.247-.713.4-1.12.44h-.23a2.14 2.14 0 0 1-1-.22a2.2 2.2 0 0 1-.9-.81a2.17 2.17 0 0 1-.33-1.16V5.421a2.2 2.2 0 0 1 .31-1.12a2.25 2.25 0 0 1 .85-.8a2.18 2.18 0 0 1 2.24.1l9.12 6.08c.29.191.53.448.7.75a2.3 2.3 0 0 1 .32.98"/></svg>
    </button>

    <button id="shuffleBtn">
      <!-- shuffle SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><title>shuffle-fill</title><g fill="none"><path d="M0 0v24h24V0zm11.407 23.258l.011.002l.071.035l.02.004l.014-.004l.071-.036q.016-.004.024.006l.004.01l.017.428l-.005.02l-.01.013l-.104.074l-.015.004l-.012-.004l-.104-.074l-.012-.016l-.004-.017l.017-.427q.004-.016.016-.018Zm-.265-.113l.014.002l.184.093l.01.01l.003.011l-.018.43l-.005.012l-.008.008l-.201.092a.03.03 0 0 1-.029-.008l-.004-.014l.034-.614q.005-.018.02-.022m.715.002a.02.02 0 0 1 .027.006l.006.014l.034.614q-.001.018-.017.024l-.015-.002l-.201-.093l-.01-.008l-.003-.011l-.018-.43l.003-.012l.01-.01z"/><path fill="currentColor" d="M17.802 3.183c-.582-.305-1.274.146-1.33.865q-.017.201-.032.452a5.5 5.5 0 0 0-4.887 3.04L11 8.646l-.553-1.106a5.5 5.5 0 0 0-4.92-3.04H4a1.5 1.5 0 1 0 0 3h1.528a2.5 2.5 0 0 1 2.236 1.382L9.323 12l-1.56 3.118A2.5 2.5 0 0 1 5.529 16.5H4a1.5 1.5 0 1 0 0 3h1.528a5.5 5.5 0 0 0 4.92-3.04L11 15.354l.553 1.106a5.5 5.5 0 0 0 4.885 3.04q.018.321.039.565c.054.671.684 1.056 1.26.755c.38-.198.933-.506 1.591-.934a20 20 0 0 0 1.515-1.083c.52-.411.539-1.216.05-1.606a20 20 0 0 0-1.533-1.1a19 19 0 0 0-1.558-.914c-.582-.305-1.274.146-1.33.865q-.017.201-.032.452a2.5 2.5 0 0 1-2.204-1.382L12.677 12l1.56-3.118a2.5 2.5 0 0 1 2.2-1.382q.02.322.04.565c.054.671.684 1.056 1.26.755a20 20 0 0 0 1.591-.934c.66-.428 1.173-.812 1.515-1.083c.52-.411.539-1.216.05-1.606a20 20 0 0 0-1.533-1.1a19 19 0 0 0-1.558-.914"/></g></svg>
    </button>
  </div>

  <div class="playlist" id="songlist"></div>
  <audio id="audio"></audio>
</div>

<script>
// STARS
const starContainer = document.getElementById("stars");
for(let i=0;i<120;i++){
  let star = document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*100+"%";
  star.style.top=Math.random()*100+"%";
  star.style.animationDelay=Math.random()*3+"s";
  starContainer.appendChild(star);
}

// SONGS
const songs = [
  {
    url: "https://raw.githubusercontent.com/jananimenon/saanj-e-ghazal/main/songs/song1.mp3",
    title: "Song 1",
    artist: "Artist 1",
    artwork: "https://raw.githubusercontent.com/jananimenon/saanj-e-ghazal/main/images/art1.jpg"
  },
  {
    url: "https://raw.githubusercontent.com/jananimenon/saanj-e-ghazal/main/songs/song2.mp3",
    title: "Song 2",
    artist: "Artist 2",
    artwork: "https://raw.githubusercontent.com/jananimenon/saanj-e-ghazal/main/images/art2.jpg"
  }
];

let currentIndex=0;
const audio=document.getElementById("audio");
const artwork=document.getElementById("artwork");
const titleDiv=document.getElementById("title");
const artistDiv=document.getElementById("artist");
const list=document.getElementById("songlist");
const playBtn=document.getElementById("playBtn");
const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");
const shuffleBtn=document.getElementById("shuffleBtn");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progressContainer");

let shuffleOn=false;

// BUILD PLAYLIST
songs.forEach((song,i)=>{
  let div=document.createElement("div");
  div.className="song";
  div.innerText=`${song.title} - ${song.artist}`;
  div.onclick=()=>playSong(i);
  list.appendChild(div);
});

function highlightCurrent(){
  document.querySelectorAll(".song").forEach((el,i)=>{
    el.classList.toggle("active", i===currentIndex);
  });
}

function playSong(i){
  currentIndex=i;
  audio.src=songs[i].url;
  audio.play();
  titleDiv.innerText=songs[i].title;
  artistDiv.innerText=songs[i].artist;
  artwork.style.backgroundImage=`url(${songs[i].artwork})`;
  highlightCurrent();
  setPlayIcon(true);
}

function setPlayIcon(isPlaying){
  playBtn.innerHTML = isPlaying ?
    `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M2 6c0-1.886 0-2.828.586-3.414S4.114 2 6 2s2.828 0 3.414.586S10 4.114 10 6v12c0 1.886 0 2.828-.586 3.414S7.886 22 6 22s-2.828 0-3.414-.586S2 19.886 2 18zm12 0c0-1.886 0-2.828.586-3.414S16.114 2 18 2s2.828 0 3.414.586S22 4.114 22 6v12c0 1.886 0 2.828-.586 3.414S19.886 22 18 22s-2.828 0-3.414-.586S14 19.886 14 18z"/></svg>` :
    `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M21.409 9.353a2.998 2.998 0 0 1 0 5.294L8.597 21.614C6.534 22.737 4 21.277 4 18.968V5.033c0-2.31 2.534-3.769 4.597-2.648z"/></svg>`;
}

function togglePlay(){
  if(audio.paused) { audio.play(); setPlayIcon(true); }
  else { audio.pause(); setPlayIcon(false); }
}

function nextSong(){
  currentIndex = shuffleOn ? Math.floor(Math.random()*songs.length) : (currentIndex+1)%songs.length;
  playSong(currentIndex);
}
function prevSong(){
  currentIndex = shuffleOn ? Math.floor(Math.random()*songs.length) : (currentIndex-1+songs.length)%songs.length;
  playSong(currentIndex);
}

playBtn.onclick = togglePlay;
nextBtn.onclick = nextSong;
prevBtn.onclick = prevSong;
shuffleBtn.onclick = ()=>{ shuffleOn=!shuffleOn; shuffleBtn.style.background = shuffleOn?"#00f":"#0d21a1"; };

audio.addEventListener("timeupdate", ()=>{
  progress.style.width = (audio.currentTime/audio.duration)*100 + "%";
});
progressContainer.onclick = e=>{
  const rect = progressContainer.getBoundingClientRect();
  const percent = (e.clientX-rect.left)/rect.width;
  audio.currentTime = percent*audio.duration;
};

audio.addEventListener("ended", nextSong);

window.onload = ()=>playSong(0);
</script>
</body>
</html>
